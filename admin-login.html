<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 — EYEPOP 연차관리</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <main class="login-container">
    <div class="login-card">
      <h1 class="login-title">관리자 로그인</h1>
      <p class="login-sub">EYEPOP 연차관리 · Phase A</p>
      <form class="login-form" id="loginForm" autocomplete="off">
        <label for="pw">비밀번호</label>
        <input type="password" id="pw" autocomplete="current-password" required>
        <div class="error" id="errorMsg">비밀번호가 일치하지 않습니다.</div>
        <button type="submit" class="btn-primary">로그인</button>
      </form>
      <p style="text-align:center; margin-top:16px;">
        <a href="/" style="font-size:12px; color: var(--gray-400);">&larr; 홈으로</a>
      </p>
    </div>
  </main>
  <script src="/js/app.js"></script>
  <script>
    const ADMIN_PW = '0494';
    const ADMIN_KEY = 'd2442d2946b8abc75f5f4226ed28c26a';
    const form = document.getElementById('loginForm');
    const errMsg = document.getElementById('errorMsg');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      if (pw === ADMIN_PW) {
        localStorage.setItem('eyepop-admin-session', JSON.stringify({
          loggedIn: true,
          loginAt: Date.now()
        }));
        localStorage.setItem('eyepop-admin-key', ADMIN_KEY);
        location.href = '/admin.html';
      } else {
        errMsg.classList.add('show');
        document.getElementById('pw').value = '';
      }
    });
  </script>
</body>
</html>
